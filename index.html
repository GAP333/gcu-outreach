<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GCU Prospect Intelligence – Outreach</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #f9f9f8; color: #1a1a1a; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d4d4d0; border-radius: 10px; }

  :root {
    --navy: #0a1628;
    --navy-mid: #122040;
    --gold: #c8952a;
    --gold-light: #e8b84b;
    --cream: #f9f9f8;
    --card-bg: #ffffff;
    --border: #e8e8e4;
    --text-dark: #1a1a1a;
    --text-mid: #555;
    --text-light: #888;
    --shadow: 0 1px 8px rgba(0,0,0,0.07);
    --shadow-hover: 0 6px 24px rgba(0,0,0,0.13);
    --green: #16a34a;
    --green-bg: #f0fdf4;
    --green-border: #bbf7d0;
    --yellow: #b45309;
    --yellow-bg: #fffbeb;
    --yellow-border: #fde68a;
  }

  /* HEADER */
  .header {
    background: var(--navy);
    padding: 0 32px;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  .header-inner {
    max-width: 1360px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    gap: 20px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header-logo {
    width: 36px;
    height: 36px;
    background: var(--gold);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--navy);
    flex-shrink: 0;
  }

  .header-title {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.2px;
  }

  .header-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .header-stats {
    display: flex;
    gap: 28px;
    align-items: center;
  }

  .hstat {
    text-align: center;
  }

  .hstat-num {
    font-size: 20px;
    font-weight: 700;
    color: var(--gold-light);
    line-height: 1;
  }

  .hstat-label {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .header-add {
    background: var(--gold);
    color: var(--navy);
    border: none;
    padding: 8px 16px;
    border-radius: 7px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .header-add:hover { background: var(--gold-light); }

  /* CONTROLS */
  .controls-wrap {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    position: sticky;
    top: 64px;
    z-index: 40;
  }

  .controls {
    max-width: 1360px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #aaa;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    padding: 9px 12px 9px 36px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    color: var(--text-dark);
    background: var(--cream);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--gold); background: #fff; }

  .filter-select {
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--text-dark);
    background: var(--cream);
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .filter-select:focus { border-color: var(--gold); }

  .count-pill {
    background: var(--navy);
    color: var(--gold-light);
    padding: 7px 14px;
    border-radius: 7px;
    font-size: 12.5px;
    font-weight: 600;
    white-space: nowrap;
  }

  /* GRID */
  .grid-wrap {
    max-width: 1360px;
    margin: 0 auto;
    padding: 24px 32px 60px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 18px;
  }

  /* CARD */
  .card {
    background: var(--card-bg);
    border-radius: 14px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    animation: fadeUp 0.35s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-hover);
  }

  .card-accent {
    height: 4px;
  }

  .card-accent-high { background: linear-gradient(90deg, var(--green), #4ade80); }
  .card-accent-medium { background: linear-gradient(90deg, var(--gold), var(--gold-light)); }
  .card-accent-low { background: linear-gradient(90deg, #9ca3af, #d1d5db); }

  .card-body {
    padding: 18px 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--gold-light);
    flex-shrink: 0;
  }

  .card-name-block { flex: 1; min-width: 0; }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text-dark);
    line-height: 1.25;
    margin-bottom: 3px;
  }

  .card-role {
    font-size: 12px;
    color: var(--text-light);
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-org {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--gold);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .tag {
    padding: 2px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    background: #f3f4f6;
    color: #555;
  }

  .tag-faith { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .tag-flag { background: #fef2f2; color: #dc2626; }

  .card-bio {
    font-size: 12.5px;
    line-height: 1.6;
    color: var(--text-mid);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-footer {
    padding: 11px 20px;
    border-top: 1px solid var(--border);
    background: #fafaf9;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .tier-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.7px;
  }

  .tier-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .tier-high .tier-dot { background: var(--green); box-shadow: 0 0 5px rgba(22,163,74,0.5); }
  .tier-high { color: var(--green); }
  .tier-medium .tier-dot { background: var(--gold); box-shadow: 0 0 5px rgba(200,149,42,0.4); }
  .tier-medium { color: var(--yellow); }
  .tier-low .tier-dot { background: #9ca3af; }
  .tier-low { color: #6b7280; }

  .card-location {
    font-size: 11px;
    color: var(--text-light);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,22,40,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: #fff;
    border-radius: 18px;
    width: 100%;
    max-width: 620px;
    max-height: 88vh;
    overflow-y: auto;
    box-shadow: 0 24px 60px rgba(0,0,0,0.3);
    animation: modalIn 0.2s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-accent { height: 5px; border-radius: 18px 18px 0 0; }
  .modal-accent-high { background: linear-gradient(90deg, var(--green), #4ade80); }
  .modal-accent-medium { background: linear-gradient(90deg, var(--gold), var(--gold-light)); }
  .modal-accent-low { background: linear-gradient(90deg, #9ca3af, #d1d5db); }

  .modal-header {
    padding: 24px 28px 16px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .modal-avatar {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--navy), var(--navy-mid));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold-light);
    flex-shrink: 0;
  }

  .modal-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text-dark);
    line-height: 1.2;
  }

  .modal-role { font-size: 13px; color: var(--text-light); margin-top: 3px; }
  .modal-org { font-size: 13px; font-weight: 600; color: var(--gold); margin-top: 2px; }

  .modal-close {
    width: 32px;
    height: 32px;
    border: none;
    background: #f3f4f6;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    color: #555;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .modal-close:hover { background: #e5e7eb; }

  .modal-body { padding: 0 28px 28px; display: flex; flex-direction: column; gap: 18px; }

  .modal-section-label {
    font-size: 10.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-light);
    margin-bottom: 6px;
  }

  .modal-text {
    font-size: 13.5px;
    line-height: 1.65;
    color: var(--text-mid);
  }

  .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; }

  .modal-meta {
    background: #f9f9f8;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .meta-row { display: flex; gap: 10px; font-size: 13px; }
  .meta-key { font-weight: 600; color: var(--text-dark); min-width: 72px; flex-shrink: 0; }
  .meta-val { color: var(--text-mid); }
  .meta-val a { color: var(--gold); text-decoration: none; }
  .meta-val a:hover { text-decoration: underline; }

  .modal-divider { border: none; border-top: 1px solid var(--border); }

  /* ADD/EDIT MODAL */
  .form-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,22,40,0.6);
    z-index: 300;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .form-modal-overlay.open { display: flex; }

  .form-modal {
    background: #fff;
    border-radius: 18px;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 24px 60px rgba(0,0,0,0.3);
  }

  .form-modal-header {
    background: var(--navy);
    padding: 20px 24px;
    border-radius: 18px 18px 0 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .form-modal-title {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.5px;
  }

  .form-modal-close {
    width: 30px;
    height: 30px;
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 7px;
    color: #fff;
    font-size: 17px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .form-modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1/-1; }

  .form-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dark); }

  .form-input, .form-textarea, .form-select {
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    color: var(--text-dark);
    background: var(--cream);
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--gold); background: #fff; }
  .form-textarea { min-height: 80px; resize: vertical; line-height: 1.5; }

  .form-modal-footer {
    padding: 14px 24px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  .btn-cancel {
    padding: 8px 18px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text-mid);
    transition: background 0.15s;
  }

  .btn-cancel:hover { background: #f3f4f6; }

  .btn-save {
    padding: 8px 20px;
    background: var(--navy);
    color: var(--gold-light);
    border: none;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-save:hover { background: #1a3060; }

  /* EMPTY */
  .empty { text-align: center; padding: 80px 20px; color: var(--text-light); grid-column: 1/-1; }
  .empty svg { margin: 0 auto 14px; display: block; opacity: 0.25; }

  /* CARD ACTION BUTTONS */
  .card-actions { display: flex; gap: 6px; }
  .btn-sm {
    padding: 4px 10px;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: background 0.12s;
  }
  .btn-edit { background: #f3f4f6; color: #374151; }
  .btn-edit:hover { background: #e5e7eb; }
  .btn-del { background: #fee2e2; color: #dc2626; }
  .btn-del:hover { background: #fecaca; }

  footer {
    text-align: center;
    padding: 20px;
    font-size: 11.5px;
    color: var(--text-light);
    border-top: 1px solid var(--border);
    background: #fff;
    letter-spacing: 0.5px;
  }

  @media (max-width: 640px) {
    .header { padding: 0 16px; }
    .controls-wrap { padding: 12px 16px; }
    .grid-wrap { padding: 16px 16px 40px; }
    .grid { grid-template-columns: 1fr; }
    .header-stats { display: none; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <div class="header-logo">GCU</div>
      <div>
        <div class="header-title">Prospect Intelligence</div>
        <div class="header-sub">GCU Outreach Dashboard</div>
      </div>
    </div>
    <div class="header-stats">
      <div class="hstat"><div class="hstat-num" id="stat-total">0</div><div class="hstat-label">Total</div></div>
      <div class="hstat"><div class="hstat-num" id="stat-high">0</div><div class="hstat-label">High Priority</div></div>
      <div class="hstat"><div class="hstat-num" id="stat-faith">0</div><div class="hstat-label">Faith ✓</div></div>
    </div>
    <button class="header-add" onclick="openFormModal()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Prospect
    </button>
  </div>
</header>

<!-- CONTROLS -->
<div class="controls-wrap">
  <div class="controls">
    <div class="search-wrap">
      <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input class="search-input" id="search" placeholder="Search name, company, category…" oninput="render()">
    </div>
    <select class="filter-select" id="cat-filter" onchange="render()">
      <option value="">All Categories</option>
    </select>
    <select class="filter-select" id="priority-filter" onchange="render()">
      <option value="">All Priorities</option>
      <option value="high">High Priority</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
    <select class="filter-select" id="faith-filter" onchange="render()">
      <option value="">All Prospects</option>
      <option value="faith">Faith Confirmed ✓</option>
    </select>
    <div class="count-pill" id="count-pill">Loading…</div>
  </div>
</div>

<!-- GRID -->
<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<footer>Grand Canyon University &nbsp;·&nbsp; Prospect Intelligence &nbsp;·&nbsp; Outreach Edition &nbsp;·&nbsp; Built for Sam Otto</footer>

<!-- VIEW MODAL -->
<div class="modal-overlay" id="view-overlay">
  <div class="modal" id="view-modal">
    <div class="modal-accent" id="view-accent"></div>
    <div class="modal-header">
      <div style="display:flex;align-items:flex-start;gap:14px;flex:1;min-width:0;">
        <div class="modal-avatar" id="view-avatar"></div>
        <div style="flex:1;min-width:0;">
          <div class="modal-name" id="view-name"></div>
          <div class="modal-role" id="view-role"></div>
          <div class="modal-org" id="view-org"></div>
        </div>
      </div>
      <button class="modal-close" onclick="closeView()">×</button>
    </div>
    <div class="modal-body">
      <div id="view-meta-block" class="modal-meta"></div>
      <hr class="modal-divider"/>
      <div id="view-bio-block"></div>
      <div id="view-faith-block"></div>
      <div id="view-angle-block"></div>
      <div id="view-tags-block"></div>
    </div>
  </div>
</div>

<!-- FORM MODAL -->
<div class="form-modal-overlay" id="form-overlay">
  <div class="form-modal">
    <div class="form-modal-header">
      <span class="form-modal-title" id="form-title">Add Prospect</span>
      <button class="form-modal-close" onclick="closeFormModal()">×</button>
    </div>
    <div class="form-modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Name *</label>
          <input class="form-input" id="f-name" placeholder="Full name">
        </div>
        <div class="form-group">
          <label class="form-label">Role / Title</label>
          <input class="form-input" id="f-role" placeholder="CEO, Founder…">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Company / Org</label>
          <input class="form-input" id="f-org" placeholder="Organization">
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-select" id="f-category">
            <option value="">Select…</option>
            <option>Entrepreneur</option><option>Sports</option><option>Media</option>
            <option>Construction</option><option>Hospitality</option><option>Technology</option>
            <option>Real Estate</option><option>Automotive</option><option>Entertainment</option>
            <option>Law</option><option>Other</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Location</label>
          <input class="form-input" id="f-location" placeholder="City, State">
        </div>
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select class="form-select" id="f-priority">
            <option value="high">High Priority</option>
            <option value="medium" selected>Medium</option>
            <option value="low">Low</option>
          </select>
        </div>
      </div>
      <div class="form-group full">
        <label class="form-label">Email / Contact</label>
        <input class="form-input" id="f-email" placeholder="email@domain.com">
      </div>
      <div class="form-group full">
        <label class="form-label">Bio / Background</label>
        <textarea class="form-textarea" id="f-bio" placeholder="Key background, achievements…"></textarea>
      </div>
      <div class="form-group full">
        <label class="form-label">Faith Signal</label>
        <textarea class="form-textarea" id="f-faith" placeholder="Known faith background…" style="min-height:64px"></textarea>
      </div>
      <div class="form-group full">
        <label class="form-label">GCU Angle / Talking Points</label>

      <div class="form-group full">
        <label class="form-label">Tags (comma-separated)</label>
        <input class="form-input" id="f-tags" placeholder="e.g. Billionaire, Arizona, Faith Leader">
      </div>
    </div>
    <div class="form-modal-footer">
      <button class="btn-cancel" onclick="closeFormModal()">Cancel</button>
      <button class="btn-save" onclick="savePerson()">Save Prospect</button>
    </div>
  </div>
</div>

];

let editingId = null;
let viewingId = null;

function initials(n) {
  return n.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
}

function accentClass(p) {
  if (p==='high') return 'card-accent-high';
  if (p==='medium') return 'card-accent-medium';
  return 'card-accent-low';
}

function tierClass(p) {
  if (p==='high') return 'tier-high';
  if (p==='medium') return 'tier-medium';
  return 'tier-low';
}

function tierLabel(p) {
  if (p==='high') return 'High Priority';
  if (p==='medium') return 'Medium';
  return 'Low';
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('cat-filter').value;
  const pri = document.getElementById('priority-filter').value;
  const faithOnly = document.getElementById('faith-filter').value === 'faith';

  const filtered = people.filter(p => {
    const txt = [p.name,p.org,p.category,p.role,p.bio,p.location,...(p.tags||[])].join(' ').toLowerCase();
    if (q && !txt.includes(q)) return false;
    if (cat && p.category !== cat) return false;
    if (pri && p.priority !== pri) return false;
    if (faithOnly && !p.faith_confirmed) return false;
    return true;
  });

  const grid = document.getElementById('grid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><p>No prospects match your filters.</p></div>`;
  } else {
    grid.innerHTML = filtered.map((p, i) => {
      const tags = (p.tags||[]).map(t => {
        let cls = 'tag';
        const tl = t.toLowerCase();
        if (tl.includes('christian')||tl.includes('faith')||tl.includes('biblical')) cls += ' tag-faith';
        if (t.includes('⚠️')) cls += ' tag-flag';
        return `<span class="${cls}">${t}</span>`;
      }).join('');

      return `<div class="card" style="animation-delay:${Math.min(i*0.035,0.5)}s" onclick="openView(${p.id})">
        <div class="card-accent ${accentClass(p.priority)}"></div>
        <div class="card-body">
          <div class="card-header">
            <div class="avatar">${initials(p.name)}</div>
            <div class="card-name-block">
              <div class="card-name">${p.name}</div>
              ${p.role ? `<div class="card-role">${p.role}</div>` : ''}
              ${p.org ? `<div class="card-org">${p.org}</div>` : ''}
            </div>
          </div>
          ${tags ? `<div class="card-tags">${tags}</div>` : ''}
          ${p.bio ? `<div class="card-bio">${p.bio}</div>` : ''}
        </div>
        <div class="card-footer">
          <div class="tier-badge ${tierClass(p.priority)}">
            <span class="tier-dot"></span>${tierLabel(p.priority)}
          </div>
          <div class="card-actions" onclick="event.stopPropagation()">
            <button class="btn-sm btn-edit" onclick="openEdit(${p.id})">Edit</button>
            <button class="btn-sm btn-del" onclick="deletePerson(${p.id})">Delete</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  document.getElementById('stat-total').textContent = people.length;
  document.getElementById('stat-high').textContent = people.filter(p=>p.priority==='high').length;
  document.getElementById('stat-faith').textContent = people.filter(p=>p.faith_confirmed).length;
  document.getElementById('count-pill').textContent = filtered.length + ' prospect' + (filtered.length!==1?'s':'');
}

function populateCats() {
  const cats = [...new Set(people.map(p=>p.category).filter(Boolean))].sort();
  const sel = document.getElementById('cat-filter');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All Categories</option>';
  cats.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    if (c===cur) o.selected = true;
    sel.appendChild(o);
  });
}

// VIEW MODAL
function openView(id) {
  const p = people.find(x=>x.id===id);
  if (!p) return;
  viewingId = id;

  document.getElementById('view-accent').className = 'modal-accent modal-accent-' + p.priority;
  document.getElementById('view-avatar').textContent = initials(p.name);
  document.getElementById('view-name').textContent = p.name;
  document.getElementById('view-role').textContent = p.role || '';
  document.getElementById('view-org').textContent = p.org || '';

  // Meta block
  let meta = '';
  if (p.location) meta += `<div class="meta-row"><span class="meta-key">Location</span><span class="meta-val">${p.location}</span></div>`;
  if (p.email) meta += `<div class="meta-row"><span class="meta-key">Contact</span><span class="meta-val"><a href="mailto:${p.email}">${p.email}</a></span></div>`;
  if (p.category) meta += `<div class="meta-row"><span class="meta-key">Category</span><span class="meta-val">${p.category}</span></div>`;
  meta += `<div class="meta-row"><span class="meta-key">Priority</span><span class="meta-val">${tierLabel(p.priority)}</span></div>`;
  meta += `<div class="meta-row"><span class="meta-key">Faith ✓</span><span class="meta-val">${p.faith_confirmed ? 'Yes' : 'Not confirmed'}</span></div>`;
  document.getElementById('view-meta-block').innerHTML = meta;

  document.getElementById('view-bio-block').innerHTML = p.bio ? `<div><div class="modal-section-label">Background</div><div class="modal-text">${p.bio}</div></div>` : '';
  document.getElementById('view-faith-block').innerHTML = p.faith ? `<div><div class="modal-section-label">Faith Signal</div><div class="modal-text">${p.faith}</div></div>` : '';
  document.getElementById('view-angle-block').innerHTML = p.angle ? `<div><div class="modal-section-label">GCU Angle</div><div class="modal-text">${p.angle}</div></div>` : '';

  const tags = (p.tags||[]).map(t => {
    let cls = 'tag';
    const tl = t.toLowerCase();
    if (tl.includes('christian')||tl.includes('faith')||tl.includes('biblical')) cls += ' tag-faith';
    return `<span class="${cls}">${t}</span>`;
  }).join('');
  document.getElementById('view-tags-block').innerHTML = tags ? `<div><div class="modal-section-label">Tags</div><div class="modal-tags">${tags}</div></div>` : '';

  document.getElementById('view-overlay').classList.add('open');
}

function closeView() {
  document.getElementById('view-overlay').classList.remove('open');
}

// FORM MODAL
function openFormModal(mode='add') {
  document.getElementById('form-title').textContent = mode==='edit' ? 'Edit Prospect' : 'Add Prospect';
  document.getElementById('form-overlay').classList.add('open');
}

function closeFormModal() {
  document.getElementById('form-overlay').classList.remove('open');
  clearForm();
  editingId = null;
}

function clearForm() {
  ['f-name','f-role','f-org','f-location','f-email','f-bio','f-faith','f-angle','f-tags'].forEach(id=>{
    document.getElementById(id).value='';
  });
  document.getElementById('f-category').value='';
  document.getElementById('f-priority').value='medium';
}

function openEdit(id) {
  const p = people.find(x=>x.id===id);
  if (!p) return;
  editingId = id;
  document.getElementById('f-name').value = p.name||'';
  document.getElementById('f-role').value = p.role||'';
  document.getElementById('f-org').value = p.org||'';
  document.getElementById('f-category').value = p.category||'';
  document.getElementById('f-location').value = p.location||'';
  document.getElementById('f-email').value = p.email||'';
  document.getElementById('f-bio').value = p.bio||'';
  document.getElementById('f-faith').value = p.faith||'';
  document.getElementById('f-angle').value = p.angle||'';
  document.getElementById('f-tags').value = (p.tags||[]).join(', ');
  document.getElementById('f-priority').value = p.priority||'medium';
  openFormModal('edit');
}

function savePerson() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Name is required.'); return; }
  const faith = document.getElementById('f-faith').value.trim();
  const tags = document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const data = {
    name, role: document.getElementById('f-role').value.trim(),
    org: document.getElementById('f-org').value.trim(),
    category: document.getElementById('f-category').value,
    location: document.getElementById('f-location').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    bio: document.getElementById('f-bio').value.trim(),
    faith, angle: document.getElementById('f-angle').value.trim(),
    tags, priority: document.getElementById('f-priority').value,
    faith_confirmed: faith.length > 0
  };
  if (editingId !== null) {
    const idx = people.findIndex(p=>p.id===editingId);
    if (idx!==-1) people[idx] = {...people[idx], ...data};
  } else {
    const maxId = people.reduce((m,p)=>Math.max(m,p.id),0);
    people.push({id: maxId+1, ...data});
  }
  closeFormModal();
  populateCats();
  render();
}

function deletePerson(id) {
  if (!confirm('Remove this prospect?')) return;
  people = people.filter(p=>p.id!==id);
  populateCats();
  render();
}

// Close modals on overlay click / escape
document.getElementById('view-overlay').addEventListener('click', e => { if (e.target===e.currentTarget) closeView(); });
document.getElementById('form-overlay').addEventListener('click', e => { if (e.target===e.currentTarget) closeFormModal(); });
document.addEventListener('keydown', e => {
  if (e.key==='Escape') { closeView(); closeFormModal(); }
});

populateCats();
render();
</script>
